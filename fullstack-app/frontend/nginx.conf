# ==============================================================================
# Nginx configuration — Task Manager Frontend
# ==============================================================================
# - Serves static files (HTML, CSS, JS)
# - Reverse proxies /api/* and /health to the backend Kubernetes service
# ==============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static files ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → backend-service (Kubernetes ClusterIP) ────────────
    location /api/ {
        proxy_pass http://backend-service:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health proxy → backend /health endpoint ───────────────────────
    location /health {
        proxy_pass http://backend-service:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 256;
}
