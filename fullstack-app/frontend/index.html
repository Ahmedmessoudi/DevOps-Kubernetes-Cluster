<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Form — Full-Stack DevOps App on Kubernetes with PostgreSQL">
  <title>Contact Form — K8s Full-Stack App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1>📬 Contact Form</h1>
        <p class="subtitle">Express.js &bull; PostgreSQL &bull; Kubernetes</p>
      </div>
      <div class="health-badge" id="health-badge">
        <span class="dot"></span>
        <span id="health-text">Checking…</span>
      </div>
    </header>

    <!-- Submit Form -->
    <section class="card">
      <h2>Submit a message</h2>
      <form id="submit-form">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name" required maxlength="100">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required maxlength="150">
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Your message…" required rows="4" maxlength="2000"></textarea>
        </div>
        <button type="submit" id="submit-btn">Send Message</button>
        <p class="form-feedback" id="form-feedback"></p>
      </form>
    </section>

    <!-- Submissions List -->
    <section class="card">
      <div class="list-header">
        <h2>Submitted messages</h2>
        <button id="refresh-btn" class="btn-outline">↻ Refresh</button>
      </div>
      <div id="submissions-list">
        <div class="loading">Loading…</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Deployed on <strong>Kubernetes</strong> &bull; CI/CD via <strong>Jenkins</strong> &bull; DB: <strong>PostgreSQL</strong></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
