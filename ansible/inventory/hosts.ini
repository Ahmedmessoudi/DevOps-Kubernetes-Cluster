# ==============================================================================
# Ansible Inventory - Kubernetes & DevOps Cluster
# ==============================================================================

[masters]
k8s-master ansible_host=192.168.56.10

[workers]
k8s-worker1 ansible_host=192.168.56.11
k8s-worker2 ansible_host=192.168.56.12

[devops_servers]
devops ansible_host=192.168.56.20 ansible_connection=local

# Group all Kubernetes nodes together
[k8s_cluster:children]
masters
workers

# Group all nodes
[all_nodes:children]
k8s_cluster
devops_servers

# Variables for all hosts
[all:vars]
ansible_user=vagrant
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
