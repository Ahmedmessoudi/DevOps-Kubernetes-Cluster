---
# ==============================================================================
# PostgreSQL Service — ClusterIP (internal only)
# Accessible within the cluster at postgres-service:5432
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: fullstack
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
