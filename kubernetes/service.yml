---
# ==============================================================================
# Kubernetes Service - Expose app via NodePort
# Access at: http://<any-node-ip>:30080
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: hello-devops-service
  labels:
    app: hello-devops
spec:
  type: NodePort
  selector:
    app: hello-devops
  ports:
    - protocol: TCP
      port: 3000          # Internal cluster port
      targetPort: 3000     # Container port
      nodePort: 30080      # External access port
