---
# ==============================================================================
# Jenkins NFS PersistentVolume and PersistentVolumeClaim
# Provides persistent storage for Jenkins home directory via NFS on k8s-master
# ==============================================================================

# 1. PersistentVolume - backed by NFS on k8s-master
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jenkins-pv
  labels:
    app: jenkins
    type: nfs
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.56.10
    path: /srv/nfs/jenkins

---
# 2. PersistentVolumeClaim - used by Jenkins Deployment
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-pvc
  namespace: jenkins
  labels:
    app: jenkins
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      type: nfs
