---
# ==============================================================================
# Jenkins Service - NodePort
# Exposes Jenkins Web UI and Agent communication ports
# ==============================================================================
# Access from browser:
#   http://192.168.56.11:32000  (via k8s-worker1)
#   http://192.168.56.12:32000  (via k8s-worker2)
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
  namespace: jenkins
  labels:
    app: jenkins
spec:
  type: NodePort
  selector:
    app: jenkins
  ports:
    # Jenkins Web UI
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 32000
    # Jenkins Agent communication
    - name: agent
      protocol: TCP
      port: 50000
      targetPort: 50000
      nodePort: 32001
